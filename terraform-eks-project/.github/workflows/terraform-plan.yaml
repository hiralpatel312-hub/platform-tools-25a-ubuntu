name: Terraform CI/CD

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var-file=dev.tfvars

      - name: Terraform Apply (on feature branch)
        if: startsWith(github.ref, 'refs/heads/feature/')
        run: terraform apply -auto-approve -var-file=dev.tfvars

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name my-eks-cluster-dev --region ${{ vars.AWS_REGION }}

      - name: Deploy Ingress NGINX
        run: kubectl apply -f ingress-nginx/deploy.yaml

      - name: Deploy Cluster Autoscaler
        run: kubectl apply -f cluster-autoscaler/deploy.yaml

      - name: Deploy Logging Addon
        run: kubectl apply -f logging/deploy.yaml


