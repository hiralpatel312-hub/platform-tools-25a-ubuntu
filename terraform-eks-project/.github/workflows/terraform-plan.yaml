name: Deploy Platform Tools (Terraform + EKS)

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Terraform and EKS Deployment
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials (OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # 3️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.5

      # 4️⃣ Terraform Init
      - name: Terraform Init
        run: terraform init

      # 5️⃣ Terraform Plan
        # This shows what Terraform would create/update/destroy
      - name: Terraform Plan
        run: terraform plan -var-file=dev.tfvars

      # 6️⃣ Terraform Apply (only on feature branches)
      - name: Terraform Apply (on feature branch)
        if: startsWith(github.ref, 'refs/heads/feature/')
        run: terraform apply -auto-approve -var-file=dev.tfvars

      # 7️⃣ Configure kubectl for EKS
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name temporary-eks-cluster-${{ vars.ENVIRONMENT_STAGE }} \
            --region ${{ vars.AWS_REGION }}

      # 8️⃣ Deploy Ingress NGINX
      - name: Deploy Ingress Controller
        run: kubectl apply -f ingress-nginx/deploy.yaml

      # 9️⃣ Deploy Cluster Autoscaler (placeholder)
      - name: Deploy Cluster Autoscaler
        run: echo "Cluster Autoscaler deployment steps go here"

      # 🔟 Enable EKS Logging (placeholder)
      - name: Enable EKS Logging
        run: echo "EKS logging setup steps go here"

      # 11️⃣ Final Cleanup Step
      - name: Final Deployment Cleanup
        run: echo "Final deployment steps and cleanup complete ✅"



