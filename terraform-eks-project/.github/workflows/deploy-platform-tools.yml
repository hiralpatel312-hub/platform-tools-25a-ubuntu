name: Terraform EKS Deployment

on:
  push:
    branches:
      - feature/**
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ENVIRONMENT_STAGE: dev

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::383585068161:role/GitHubActionsTerraformIAMrole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.9.7

      # 👇 Terraform commands now run in your root directory
      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=dev.tfvars

      - name: Terraform Apply
        if: startsWith(github.ref, 'refs/heads/feature/')
        run: terraform apply -auto-approve -var-file=dev.tfvars

      # 👇 Configure kubectl once EKS is ready
      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --name temporary-eks-cluster-${{ env.ENVIRONMENT_STAGE }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Ingress Controller
        run: |
          echo "Deploying ingress controller..."
          kubectl apply -f ingress-nginx/deploy.yaml || echo "Ingress deploy skipped"
        continue-on-error: true

      - name: Deploy Cluster Autoscaler
        run: |
          echo "Deploying Cluster Autoscaler..."
          # kubectl apply -f k8s/cluster-autoscaler.yaml
        continue-on-error: true

      - name: Enable EKS Logging
        run: |
          echo "Setting up EKS logging..."
          # Add your logging setup here if needed
        continue-on-error: true

      - name: Final Steps
        run: echo "✅ Terraform EKS deployment complete!"
