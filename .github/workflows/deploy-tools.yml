name: Terraform EKS Deployment

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-platform-tools:
    runs-on: ubuntu-latest
    environment: dev

    env:
      AWS_REGION: us-east-1
      ENVIRONMENT_STAGE: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # 🟢 Run Terraform from correct directory
      - name: Terraform Init
        working-directory: terraform-eks-project
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform-eks-project
        run: terraform plan -var-file=dev.tfvars

      - name: Terraform Apply (on feature branch)
        if: startsWith(github.ref, 'refs/heads/feature/')
        working-directory: terraform-eks-project
        run: terraform apply -auto-approve -var-file=dev.tfvars

      - name: Terraform Apply (on main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: terraform-eks-project
        run: terraform apply -auto-approve -var-file=dev.tfvars

      # 🟣 Optional: Post-deploy steps
      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name temporary-eks-cluster-${ENVIRONMENT_STAGE} --region $AWS_REGION

      - name: Deploy Ingress Controller
        run: kubectl apply -f ingress-nginx/deploy.yaml

      - name: Deploy Cluster Autoscaler
        run: echo "Deploy Cluster Autoscaler steps go here"

      - name: Deploy EKS Logging
        run: echo "Deploy EKS Logging steps go here"

      - name: Final deployment steps and cleanup
        run: echo "Final deployment steps and cleanup"
