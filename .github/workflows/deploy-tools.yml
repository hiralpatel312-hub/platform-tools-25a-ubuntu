name: EKS Platform Deployment
 
on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
 
env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.9.5
  TF_DIR: terraform-eks-project
  K8S_DIR: k8s
  CLUSTER_NAME: eks-cluster-dev-cluster
  APP_NAMESPACE: my-app
  APP_NAME: my-app
 
permissions:
  id-token: write
  contents: read
 
jobs:
 
  # ══════════════════════════════════════════════════════════
  # STAGE 1 — Security Scanning
  # ══════════════════════════════════════════════════════════
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: tfsec — IaC misconfiguration scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ env.TF_DIR }}
          soft_fail: false
 
  # ══════════════════════════════════════════════════════════
  # STAGE 2 — Terraform Plan
  # ══════════════════════════════════════════════════════════
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=099695389768-state-bucket-dev1" \
            -backend-config="key=eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=terraformlock"
 
      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive
 
      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate
 
      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -var-file=dev.tfvars -out=tfplan
 
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1
 
  # ══════════════════════════════════════════════════════════
  # STAGE 3 — Apply + Deploy
  # ══════════════════════════════════════════════════════════
  deploy:
    name: Apply & Deploy
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
 
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=099695389768-state-bucket-dev1" \
            -backend-config="key=eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=terraformlock"
 
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TF_DIR }}
 
      # ── Infrastructure ──────────────────────────────────
      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan
 
      - name: Get cluster name from Terraform output
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "cluster_name=${CLUSTER_NAME}" >> $GITHUB_OUTPUT
 
      - name: Wait for EKS cluster to be ACTIVE
        run: |
          echo "Waiting for cluster: ${{ steps.tf-outputs.outputs.cluster_name }}"
          aws eks wait cluster-active \
            --name ${{ steps.tf-outputs.outputs.cluster_name }} \
            --region ${{ env.AWS_REGION }}
          echo "Cluster is ACTIVE"
 
      # FIXED: Update kubeconfig FIRST before any kubectl commands
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ steps.tf-outputs.outputs.cluster_name }} \
            --region ${{ env.AWS_REGION }}
 
      # FIXED: aws-auth AFTER kubeconfig so kubectl can connect
      - name: Apply aws-auth ConfigMap
        run: |
          NODE_ROLE_ARN=$(aws iam get-role \
            --role-name eks-cluster-dev-node-role \
            --query 'Role.Arn' \
            --output text)
 
          cat <<EOF | kubectl apply --validate=false -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: aws-auth
            namespace: kube-system
          data:
            mapRoles: |
              - rolearn: ${NODE_ROLE_ARN}
                username: system:node:{{EC2PrivateDNSName}}
                groups:
                  - system:bootstrappers
                  - system:nodes
          EOF
 
      - name: Wait for nodes to be Ready
        run: |
          echo "Waiting for all worker nodes to join and become Ready..."
          kubectl wait --for=condition=Ready nodes \
            --all \
            --timeout=300s
          echo "All nodes are Ready"
          kubectl get nodes -o wide
 
      # ── Deploy application via kubectl ──────────────────
      - name: Apply namespace
        run: kubectl apply -f ${{ env.K8S_DIR }}/namespace.yaml
 
      - name: Apply Deployment
        run: kubectl apply -f ${{ env.K8S_DIR }}/deployment.yaml
 
      - name: Apply Service
        run: kubectl apply -f ${{ env.K8S_DIR }}/service.yaml
 
      - name: Wait for Deployment rollout
        run: |
          echo "Waiting for pods to be Running and healthy..."
          kubectl rollout status deployment/${{ env.APP_NAME }} \
            --namespace=${{ env.APP_NAMESPACE }} \
            --timeout=300s
          echo "Deployment rollout complete"
 
      # ── Get NodePort URL ────────────────────────────────
      - name: Get NodePort URL
        run: |
          echo "Getting NodePort service details..."
          kubectl get svc -n ${{ env.APP_NAMESPACE }}
          echo ""
          echo "=================================================="
          echo "  APP IS RUNNING"
          echo "  Access via: kubectl port-forward"
          echo "  kubectl port-forward -n my-app svc/my-app-svc 8080:80"
          echo "  Then open: http://localhost:8080"
          echo "=================================================="
 
      # ── Final summary ───────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo ""
          echo "=================================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "=================================================="
          echo ""
          echo "  Cluster  : ${{ steps.tf-outputs.outputs.cluster_name }}"
          echo "  Region   : ${{ env.AWS_REGION }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "=================================================="
          echo ""
          echo "--- Cluster nodes ---"
          kubectl get nodes -o wide
          echo ""
          echo "--- App pods ---"
          kubectl get pods -n ${{ env.APP_NAMESPACE }} -o wide
          echo ""
          echo "--- Services ---"
          kubectl get svc -n ${{ env.APP_NAMESPACE }}
 
      # ── Auto rollback if anything failed ────────────────
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Something failed — rolling back Deployment..."
          kubectl rollout undo deployment/${{ env.APP_NAME }} \
            --namespace=${{ env.APP_NAMESPACE }} || true
          echo "Pod status after rollback:"
          kubectl get pods -n ${{ env.APP_NAMESPACE }}
 